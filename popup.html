<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>개인용 DC 단축키</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1>개인용 DC 단축키</h1>
        <p>DC 단축키만 남긴 최소 버전</p>
      </header>

      <section class="section">
        <label class="toggle important">
          <input id="enabled" type="checkbox" />
          <span>확장 기능 전체 활성화</span>
        </label>
        <label class="toggle">
          <input id="ignoreWhenTyping" type="checkbox" />
          <span>입력창 포커스 중에는 단축키 무시</span>
        </label>
        <label class="toggle">
          <input id="refreshCommentsOnD" type="checkbox" />
          <span>D 키로 댓글 이동 시 새로고침도 실행</span>
        </label>
        <label class="toggle">
          <input id="numberNavigation" type="checkbox" />
          <span>숫자 키(1~0)로 목록 N번째 글 이동</span>
        </label>
        <label class="toggle">
          <input id="showUserInfo" type="checkbox" />
          <span>작성자 IP/ID 색상 배지 표시</span>
        </label>
      </section>

      <section class="section">
        <h2>단축키</h2>
        <div class="shortcut-grid">
          <label class="toggle"><input data-shortcut="W" type="checkbox" /><span><b>W</b> 글쓰기</span></label>
          <label class="toggle"><input data-shortcut="C" type="checkbox" /><span><b>C</b> 댓글 입력창 포커스</span></label>
          <label class="toggle"><input data-shortcut="D" type="checkbox" /><span><b>D</b> 댓글 영역 이동</span></label>
          <label class="toggle"><input data-shortcut="R" type="checkbox" /><span><b>R</b> 새로고침</span></label>
          <label class="toggle"><input data-shortcut="F" type="checkbox" /><span><b>F</b> 전체글</span></label>
          <label class="toggle"><input data-shortcut="G" type="checkbox" /><span><b>G</b> 개념글</span></label>
          <label class="toggle"><input data-shortcut="A" type="checkbox" /><span><b>A</b> 이전 페이지(최신 방향)</span></label>
          <label class="toggle"><input data-shortcut="S" type="checkbox" /><span><b>S</b> 다음 페이지</span></label>
          <label class="toggle"><input data-shortcut="Z" type="checkbox" /><span><b>Z</b> 이전 글</span></label>
          <label class="toggle"><input data-shortcut="X" type="checkbox" /><span><b>X</b> 다음 글</span></label>
        </div>
      </section>

      <section class="section note">
        <p>한/영 상태와 상관없이 <strong>키 위치 기준</strong>으로 동작하도록 만들었습니다.</p>
        <p>예: 한국어 입력 상태여도 W/A/S/D 위치 키가 그대로 작동합니다.</p>
      </section>

      <footer class="footer">
        <button id="reset" type="button">기본값으로 복원</button>
        <span id="status" aria-live="polite"></span>
      </footer>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
